<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Un Proyecto Especial</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --primary: #80deea; --accent: #ffca28; --bg-dark: #050a18; }
        body { background-color: var(--bg-dark); color: white; font-family: 'Poppins', sans-serif; text-align: center; margin: 0; padding: 20px; overflow-x: hidden; }
        .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle, #1b2735 0%, #050a18 100%); }
        
        #secret-button-container { display: flex; justify-content: center; align-items: center; height: 90vh; }
        .btn-secret { 
            background: linear-gradient(45deg, #5bc0be, #ffca28); color: #050a18; border: none; 
            padding: 20px 40px; font-size: 1.5rem; font-weight: bold; border-radius: 50px; 
            cursor: pointer; box-shadow: 0 0 30px rgba(91, 192, 190, 0.5); transition: 0.4s; 
        }

        #main-content { display: none; }
        h1 { font-family: 'Dancing Script', cursive; color: var(--primary); font-size: 3.5rem; margin-top: 30px; text-shadow: 0 0 15px var(--primary); }
        .name { font-family: 'Dancing Script', cursive; color: var(--accent); font-size: 3rem; display: block; text-shadow: 0 0 20px var(--accent); }
        
        .message { 
            background: rgba(255, 255, 255, 0.08); padding: 35px; border-radius: 30px; 
            max-width: 500px; margin: 30px auto; min-height: 150px; 
            line-height: 1.8; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(12px);
            font-size: 1.2rem; text-align: left; white-space: pre-line; position: relative;
        }

        .magic-text { 
            color: #ffca28; 
            text-shadow: 0 0 15px #ffca28, 0 0 35px #ffca28, 0 0 60px #ffca28, 0 0 90px #ffca28;
            font-weight: bold;
        }

        .gallery { display: flex; flex-direction: column; align-items: center; gap: 25px; margin-top: 40px; }
        .gallery img { 
            width: 100%; max-width: 550px; border-radius: 20px; 
            border: 3px solid rgba(255, 255, 255, 0.2); 
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            opacity: 0; transform: translateY(20px); transition: 1s;
        }
        .gallery img.show { opacity: 1; transform: translateY(0); }
        .footer { margin-top: 80px; color: var(--primary); font-size: 1rem; opacity: 0.7; }
    </style>
</head>
<body>
    <div class="stars"></div>

    <audio id="soundClick" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>
    <audio id="soundFirework" src="https://assets.mixkit.co/active_storage/sfx/2854/2854-preview.mp3"></audio>
    <audio id="soundMagic" src="https://assets.mixkit.co/active_storage/sfx/1384/1384-preview.mp3" volume="0.3"></audio>
    <audio id="soundPop" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio>

    <div id="secret-button-container">
        <button class="btn-secret" onclick="showSurprise()">🎁 Secret: Click me ✨</button>
    </div>

    <div id="main-content">
        <h1 id="title"></h1>
        <span class="name" id="userName"></span>
        <div class="message"><div id="typewriter-text"></div></div>
        <div class="gallery" id="gallery">
            <img src="pic1.jpg"> <img src="pic1••.jpg">
            <img src="pic2.jpg"> <img src="pic2••.jpg">
            <img src="pic3.jpg"> <img src="pic3••.jpg">
            <img src="pic4••.jpg">
        </div>
        <div class="footer">Hecho con mucho cariño 🤍 por Aman</div>
    </div>

    <script>
        const text = "Querida Danna Marcela, ❤️ \n\n¡Hoy es un día muy especial para celebrar tu vida! 🥳 Gracias por ser mi luz en el cielo de Sky 🌌 y por compartir tantos momentos hermosos conmigo 🎮✨.\n\nNuestra amistad significa mucho para mí. 💖 Gracias por escucharme siempre, por tu gran apoyo y por estar ahí, incluso a pesar de la distancia 🌍✈️.\n\n¡Te deseo un día lleno de risas, magia y bendiciones! 🎈🎉🎁🌈";

        function typeWriterMagic(text, i, fnCallback) {
            const textElement = document.getElementById("typewriter-text");
            const magicSound = document.getElementById("soundMagic");
            
            if (i < text.length) {
                const char = text.charAt(i);
                const isEmoji = /[\uD800-\uDBFF][\uDC00-\uDFFF]/.test(char + text.charAt(i+1));
                let visibleText = text.substring(0, i);
                let currentChar = text.substring(i, i + (isEmoji ? 2 : 1));
                
                textElement.innerHTML = visibleText + '<span class="magic-text">' + currentChar + '</span>';
                
                // تشغيل صوت الكتابة السحرية بشكل متقطع ليكون واقعياً
                if (i % 3 === 0) { 
                    magicSound.currentTime = 0;
                    magicSound.play();
                }

                const lastCharElement = textElement.querySelector('.magic-text');
                if (lastCharElement) {
                    const rect = lastCharElement.getBoundingClientRect();
                    confetti({
                        particleCount: 12,
                        startVelocity: 2,
                        ticks: 45,
                        gravity: 0.1,
                        origin: { x: (rect.left + rect.width / 2) / window.innerWidth, y: (rect.top + rect.height / 2) / window.innerHeight },
                        colors: ['#ffca28', '#ffffff', '#fff176'],
                        shapes: ['circle', 'star'],
                        scalar: 0.7,
                        zIndex: 10
                    });
                }

                setTimeout(function() { 
                    typeWriterMagic(text, i + (isEmoji ? 2 : 1), fnCallback) 
                }, isEmoji ? 100 : 55);

            } else if (typeof fnCallback == 'function') {
                textElement.innerHTML = text;
                setTimeout(fnCallback, 500);
            }
        }

        function showImagesSequentially() {
            const images = document.querySelectorAll('.gallery img');
            const popSound = document.getElementById('soundPop');
            let delay = 0;

            images.forEach((img, index) => {
                setTimeout(() => {
                    img.classList.add('show');
                    popSound.currentTime = 0;
                    popSound.play();
                }, delay);
                delay += 800; // الفرق الزمني بين ظهور كل صورة
            });
        }

        function showSurprise() {
            document.getElementById('soundClick').play();
            document.getElementById('soundFirework').play();
            
            document.getElementById('secret-button-container').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            
            var end = Date.now() + (4 * 1000);
            (function frame() {
                confetti({ particleCount: 8, angle: 60, spread: 60, origin: { x: 0 }, colors: ['#80deea', '#ffca28'] });
                confetti({ particleCount: 8, angle: 120, spread: 60, origin: { x: 1 }, colors: ['#80deea', '#ffca28'] });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());

            document.getElementById("title").innerHTML = "¡Feliz Cumpleaños!";
            document.getElementById("userName").innerHTML = "Danna Marcela 🎂✨";
            
            typeWriterMagic(text, 0, function(){
                showImagesSequentially();
            });
        }
    </script>
</body>
</html>
