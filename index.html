<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Un Proyecto Especial</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --primary: #80deea; --accent: #ffca28; --bg-dark: #050a18; }
        body { background-color: var(--bg-dark); color: white; font-family: 'Poppins', sans-serif; text-align: center; margin: 0; padding: 20px; overflow-x: hidden; }
        .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle, #1b2735 0%, #050a18 100%); }
        
        #secret-button-container { display: flex; justify-content: center; align-items: center; height: 90vh; }
        .btn-secret { 
            background: linear-gradient(45deg, #5bc0be, #ffca28); color: #050a18; border: none; 
            padding: 20px 40px; font-size: 1.5rem; font-weight: bold; border-radius: 50px; 
            cursor: pointer; box-shadow: 0 0 30px rgba(91, 192, 190, 0.5); transition: 0.4s; 
        }

        #main-content { display: none; }
        h1 { font-family: 'Dancing Script', cursive; color: var(--primary); font-size: 3.5rem; margin-top: 30px; text-shadow: 0 0 15px var(--primary); }
        .name { font-family: 'Dancing Script', cursive; color: var(--accent); font-size: 3rem; display: block; text-shadow: 0 0 20px var(--accent); }
        
        .message { 
            background: rgba(255, 255, 255, 0.08); padding: 30px; border-radius: 30px; 
            max-width: 500px; margin: 30px auto; min-height: 150px; 
            line-height: 1.8; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px);
            font-size: 1.15rem; text-align: left; white-space: pre-line;
            position: relative;
        }

        /* تنسيق البريق السحري أثناء الكتابة */
        .magic-text {
            color: white;
            text-shadow: 0 0 10px rgba(255, 202, 40, 0.8), 0 0 20px rgba(255, 202, 40, 0.5);
            transition: text-shadow 0.1s;
        }

        .gallery { display: flex; flex-direction: column; align-items: center; gap: 25px; margin-top: 40px; opacity: 0; transition: opacity 2s; }
        .gallery img { width: 100%; max-width: 550px; border-radius: 20px; border: 3px solid rgba(255, 255, 255, 0.2); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .footer { margin-top: 80px; color: var(--primary); font-size: 1rem; opacity: 0.7; }
    </style>
</head>
<body>
    <div class="stars"></div>

    <div id="secret-button-container">
        <button class="btn-secret" onclick="showSurprise()">🎁 Secret: Click me ✨</button>
    </div>

    <div id="main-content">
        <h1 id="title"></h1>
        <span class="name" id="userName"></span>
        
        <div class="message" id="typewriter-text"></div>

        <div class="gallery" id="gallery">
            <img src="pic1.jpg"> <img src="pic1••.jpg">
            <img src="pic2.jpg"> <img src="pic2••.jpg">
            <img src="pic3.jpg"> <img src="pic3••.jpg">
            <img src="pic4••.jpg">
        </div>
        <div class="footer">Hecho con mucho cariño 🤍 por Aman</div>
    </div>

    <script>
        const text = "Querida Danna Marcela, ❤️ \n\n¡Hoy es un día muy especial para celebrar tu vida! 🥳 Gracias por ser mi luz en el cielo de Sky 🌌 y por compartir tantos momentos hermosos conmigo 🎮✨.\n\nNuestra amistad significa mucho para mí. 💖 Gracias por escucharme siempre, por tu gran apoyo y por estar ahí, incluso a pesar de la distancia 🌍✈️.\n\n¡Te deseo un día lleno de risas, magia y bendiciones! 🎈🎉🎁🌈";

        // تأثير الكتابة السحرية
        function typeWriterMagic(text, i, fnCallback) {
            if (i < text.length) {
                const char = text.charAt(i);
                const isEmoji = /[\uD800-\uDBFF][\uDC00-\uDFFF]/.test(char + text.charAt(i+1));
                
                let visibleText = text.substring(0, i);
                letcurrentChar = text.substring(i, i + (isEmoji ? 2 : 1));
                
                // إضافة الحرف بتأثير لامع
                document.getElementById("typewriter-text").innerHTML = visibleText + '<span class="magic-text">' + currentChar + '</span>';
                
                // إطلاق غبار نجوم صغير (Sparkles) عند موضع الكتابة
                if (Math.random() > 0.6) { // لا نطلقها مع كل حرف لكي لا تكون كثيفة جداً
                    confetti({
                        particleCount: 1,
                        startVelocity: 0,
                        ticks: 30,
                        gravity: 0.2,
                        origin: {
                            x: Math.random() * 0.1 + 0.45, // تمركز حول منطقة الرسالة
                            y: Math.random() * 0.1 + 0.4
                        },
                        colors: ['#ffca28', '#ffffff'],
                        shapes: ['circle'],
                        scalar: 0.5,
                        zIndex: 10
                    });
                }

                setTimeout(function() { 
                    typeWriterMagic(text, i + (isEmoji ? 2 : 1), fnCallback) 
                }, isEmoji ? 100 : 50); // إبطاء قليلاً عند الإيموجي

            } else if (typeof fnCallback == 'function') {
                // إزالة التأثير اللامع عن النص كله بعد الانتهاء
                document.getElementById("typewriter-text").innerHTML = text;
                setTimeout(fnCallback, 500);
            }
        }

        function showSurprise() {
            document.getElementById('secret-button-container').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            
            // الألعاب النارية الأساسية
            var end = Date.now() + (4 * 1000);
            (function frame() {
                confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#80deea', '#ffca28'] });
                confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#80deea', '#ffca28'] });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());

            document.getElementById("title").innerHTML = "¡Feliz Cumpleaños!";
            document.getElementById("userName").innerHTML = "Danna Marcela 🎂✨";
            
            // البدء بالكتابة السحرية
            typeWriterMagic(text, 0, function(){
                document.getElementById("gallery").style.opacity = "1";
            });
        }
    </script>
</body>
</html>
