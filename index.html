<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Un Proyecto Especial para Danna</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Caveat:wght@400;700&family=Playfair+Display:ital,wght=1,600&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { 
            --bg-dark: #02040a; 
            --deep-purple: #1a0b2e; 
            --text-white: #f8f9fa; 
            --sky-blue: #00d2ff; 
            --ruby-red: #ff003c; 
        }

        body { 
            background: linear-gradient(135deg, var(--bg-dark) 0%, var(--deep-purple) 100%); 
            color: var(--text-white); 
            font-family: 'Poppins', sans-serif; 
            text-align: center; 
            margin: 0; 
            padding: 20px; 
            overflow-x: hidden; 
            min-height: 100vh;
        }

        .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        
        #secret-button-container { 
            display: flex; 
            flex-direction: column; /* ترتيب رأسي للعناصر */
            justify-content: center; 
            align-items: center; 
            height: 90vh; 
            position: relative;
        }

        /* تنسيق الجملة التحذيرية فوق الزر */
        .click-warning {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.1rem;
            margin-bottom: 20px; /* مسافة فوق الزر */
            text-transform: lowercase;
            font-weight: 300;
            letter-spacing: 1px;
        }

        /* --- تنسيق الزر الجديد باللون الأسود والأبيض --- */
        .btn-secret { 
            background-color: #000000; /* خلفية سوداء محايدة */
            color: #ffffff; /* نص أبيض محايد */
            border: 2px solid rgba(255, 255, 255, 0.3); /* حافة بيضاء خفيفة */
            padding: 20px 50px; 
            font-size: 1.6rem; 
            font-weight: 600; 
            border-radius: 10px; /* زوايا أقل حدة لفخامة عصرية */
            cursor: pointer; 
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8); 
            transition: 0.4s ease-in-out; 
            text-transform: none;
            position: relative; /* ضروري لوضع الأسهم */
            z-index: 10;
        }
        .btn-secret:hover {
            background-color: #ffffff; /* يتحول للأبيض عند التمرير */
            color: #000000; /* النص يصبح أسود */
            border-color: #000000;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.5);
            transform: scale(1.03);
        }

        /* --- تنسيق وحركة الأسهم (Top & Bottom) --- */
        .arrow {
            position: absolute;
            color: #ffffff;
            font-size: 2.5rem;
            opacity: 0.8;
            animation: arrowBlink 1.5s infinite;
            pointer-events: none; /* لا يتداخل مع الضغط على الزر */
        }

        /* السهم العلوي */
        .arrow-top {
            bottom: 110%; /* فوق الزر بقليل */
            left: 50%;
            transform: translateX(-50%) rotate(0deg); /* يشير لأسفل */
        }
        
        /* السهم السفلي */
        .arrow-bottom {
            top: 110%; /* تحت الزر بقليل */
            left: 50%;
            transform: translateX(-50%) rotate(180deg); /* يشير لأعلى */
        }

        @keyframes arrowBlink {
            0%, 100% { opacity: 0.3; transform: translateX(-50%) translateY(0px); }
            50% { opacity: 1; transform: translateX(-50%) translateY(10px); } /* حركة نبضية */
        }
        /* تعديل اتجاه الحركة للسهم السفلي */
        .arrow-bottom { animation-name: arrowBlinkBottom; }
        @keyframes arrowBlinkBottom {
            0%, 100% { opacity: 0.3; transform: translateX(-50%) rotate(180deg) translateY(0px); }
            50% { opacity: 1; transform: translateX(-50%) rotate(180deg) translateY(-10px); }
        }

        #main-content { display: none; }
        
        h1 { 
            font-family: 'Dancing Script', cursive; 
            color: var(--text-white); 
            font-size: 3.5rem; 
            margin-top: 30px; 
            text-shadow: 0 0 20px var(--ruby-red), 0 0 40px var(--sky-blue); 
        }
        
        .name { 
            font-family: 'Playfair Display', serif; 
            font-style: italic;
            color: var(--sky-blue); 
            font-size: 3.2rem; 
            display: block; 
            text-shadow: 0 0 25px var(--sky-blue); 
            margin-bottom: 20px;
        }
        
        .message { 
            background: rgba(255, 255, 255, 0.05); 
            padding: 40px; border-radius: 25px; 
            max-width: 550px; margin: 35px auto; 
            line-height: 1.4; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(15px);
            font-family: 'Caveat', cursive;
            font-size: 1.8rem; 
            text-align: left; 
            white-space: pre-line;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            color: var(--text-white);
        }

        .magic-text { 
            color: var(--text-white);
            font-weight: bold;
            animation: colorShift 3s infinite;
        }

        @keyframes colorShift {
            0% { text-shadow: 0 0 15px var(--ruby-red); }
            50% { text-shadow: 0 0 15px var(--sky-blue); }
            100% { text-shadow: 0 0 15px var(--ruby-red); }
        }

        .gallery { display: flex; flex-direction: column; align-items: center; gap: 30px; margin-top: 50px; }
        .gallery img { 
            width: 100%; max-width: 550px; border-radius: 15px; 
            border: 2px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            opacity: 0; transform: translateY(30px); transition: 1.8s;
        }
        .gallery img.show { opacity: 1; transform: translateY(0); }
        
        .footer { margin-top: 100px; color: var(--text-white); font-size: 0.9rem; opacity: 0.5; font-family: 'Poppins', sans-serif; }
    </style>
</head>
<body>
    <div class="stars"></div>

    <div id="secret-button-container">
        <div class="click-warning">⚠️ click this button</div>
        
        <button class="btn-secret" onclick="showSurprise()">
            <span class="arrow arrow-top">▼</span> 🎁 Don't click ✨
            <span class="arrow arrow-bottom">▼</span> </button>
    </div>

    <div id="main-content">
        <h1 id="title"></h1>
        <span class="name" id="userName"></span>
        <div class="message"><div id="typewriter-text"></div></div>
        <div class="gallery" id="gallery">
            <img src="pic1.jpg"> <img src="pic1••.jpg">
            <img src="pic2.jpg"> <img src="pic2••.jpg">
            <img src="pic3.jpg"> <img src="pic3••.jpg">
            <img src="pic4••.jpg">
        </div>
        <div class="footer">Creado con cariño por Aman 🤍</div>
    </div>

    <script>
        const text = "Querida Danna Marcela, ❤️ \n\n¡Hoy es un día muy especial para celebrar tu vida! 🥳 Gracias por ser mi luz en el cielo de Sky 🌌 y por ser parte de mi viaje ✨.\n\nNuestra amistad es un tesoro. 💖 Gracias por escucharme siempre y por estar ahí, a pesar de la distancia 🌍✈️.\n\n¡Te deseo un día lleno de risas, magia y bendiciones! 🎈🎉🎁🌈";

        function typeWriterMagic(text, i, fnCallback) {
            const textElement = document.getElementById("typewriter-text");
            if (i < text.length) {
                const char = text.charAt(i);
                const isEmoji = /[\uD800-\uDBFF][\uDC00-\uDFFF]/.test(char + text.charAt(i+1));
                textElement.innerHTML = text.substring(0, i) + '<span class="magic-text">' + text.substring(i, i + (isEmoji ? 2 : 1)) + '</span>';
                
                const lastCharElement = textElement.querySelector('.magic-text');
                if (lastCharElement) {
                    const rect = lastCharElement.getBoundingClientRect();
                    confetti({
                        particleCount: 10,
                        startVelocity: 3,
                        origin: { x: (rect.left + rect.width / 2) / window.innerWidth, y: (rect.top + rect.height / 2) / window.innerHeight },
                        colors: ['#ff003c', '#00d2ff', '#ffffff', '#1a0b2e'],
                        shapes: ['circle', 'star']
                    });
                }
                setTimeout(() => typeWriterMagic(text, i + (isEmoji ? 2 : 1), fnCallback), isEmoji ? 100 : 50);
            } else if (fnCallback) {
                textElement.innerHTML = text;
                setTimeout(fnCallback, 500);
            }
        }

        function showSurprise() {
            document.getElementById('secret-button-container').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            
            var end = Date.now() + (5 * 1000);
            (function frame() {
                confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#ff003c', '#00d2ff'] });
                confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#ff003c', '#00d2ff'] });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());

            document.getElementById("title").innerHTML = "¡Feliz Cumpleaños!";
            document.getElementById("userName").innerHTML = "Danna Marcela 🎂🌌";
            
            typeWriterMagic(text, 0, function(){
                const images = document.querySelectorAll('.gallery img');
                images.forEach((img, i) => setTimeout(() => img.classList.add('show'), i * 900));
            });
        }
    </script>
</body>
</html>
