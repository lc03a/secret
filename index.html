<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Un Proyecto Especial</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --primary: #80deea; --accent: #ffca28; --bg-dark: #050a18; }
        body { background-color: var(--bg-dark); color: white; font-family: 'Poppins', sans-serif; text-align: center; margin: 0; padding: 20px; overflow-x: hidden; }
        .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle, #1b2735 0%, #050a18 100%); }
        
        #secret-button-container { display: flex; justify-content: center; align-items: center; height: 90vh; }
        .btn-secret { 
            background: linear-gradient(45deg, #5bc0be, #ffca28); color: #050a18; border: none; 
            padding: 20px 40px; font-size: 1.5rem; font-weight: bold; border-radius: 50px; 
            cursor: pointer; box-shadow: 0 0 30px rgba(91, 192, 190, 0.5); transition: 0.4s; 
        }

        #main-content { display: none; }
        h1 { font-family: 'Dancing Script', cursive; color: var(--primary); font-size: 3.5rem; margin-top: 30px; }
        .name { font-family: 'Dancing Script', cursive; color: var(--accent); font-size: 3rem; display: block; }
        
        .message { 
            background: rgba(255, 255, 255, 0.1); padding: 30px; border-radius: 30px; 
            max-width: 500px; margin: 30px auto; min-height: 200px; 
            line-height: 1.8; border: 1px solid rgba(255,255,255,0.15); backdrop-filter: blur(10px);
            font-size: 1.1rem; text-align: left;
        }

        .gallery { display: flex; flex-direction: column; align-items: center; gap: 25px; margin-top: 40px; opacity: 0; transition: opacity 2s; }
        .gallery img { width: 100%; max-width: 550px; border-radius: 20px; border: 3px solid rgba(255, 255, 255, 0.2); }
        .footer { margin-top: 80px; color: var(--primary); font-size: 1rem; opacity: 0.7; }
    </style>
</head>
<body>
    <div class="stars"></div>

    <audio id="fireworkSound" src="https://assets.mixkit.co/active_storage/sfx/2854/2854-preview.mp3"></audio>
    <audio id="bgMusic" loop src="https://www.bensound.com/bensound-music/bensound-love.mp3"></audio>

    <div id="secret-button-container">
        <button class="btn-secret" onclick="showSurprise()">🎁 Secret: Click me ✨</button>
    </div>

    <div id="main-content">
        <h1 id="title"></h1>
        <span class="name" id="userName"></span>
        
        <div class="message" id="typewriter-text"></div>

        <div class="gallery" id="gallery">
            <img src="pic1.jpg"> <img src="pic1••.jpg">
            <img src="pic2.jpg"> <img src="pic2••.jpg">
            <img src="pic3.jpg"> <img src="pic3••.jpg">
            <img src="pic4••.jpg">
        </div>
        <div class="footer">Hecho con mucho cariño 🤍 por Aman</div>
    </div>

    <script>
        const text = "Querida Danna Marcela, ❤️ \n\n¡Hoy es un día muy especial para celebrar tu vida! 🥳 Gracias por ser mi luz en el cielo de Sky 🌌 و compartir tantos momentos hermosos conmigo 🎮✨.\n\nNuestra amistad significa mucho para mí. 💖 Gracias por escucharme siempre, por tu gran apoyo y por estar ahí, incluso a pesar de la distancia 🌍✈️.\n\n¡Te deseo un día lleno de risas, magia y bendiciones! 🎈🎉🎁";

        function typeWriter(text, i, fnCallback) {
            if (i < text.length) {
                document.getElementById("typewriter-text").innerHTML = text.substring(0, i+1) +'<span aria-hidden="true"></span>';
                setTimeout(function() { typeWriter(text, i + 1, fnCallback) }, 50);
            } else if (typeof fnCallback == 'function') {
                setTimeout(fnCallback, 700);
            }
        }

        function showSurprise() {
            document.getElementById('secret-button-container').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            
            // تشغيل الأصوات
            document.getElementById('fireworkSound').play();
            document.getElementById('bgMusic').play();

            // الألعاب النارية
            var end = Date.now() + (4 * 1000);
            (function frame() {
                confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#80deea', '#ffca28'] });
                confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#80deea', '#ffca28'] });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());

            // البدء في كتابة النص
            document.getElementById("title").innerHTML = "¡Feliz Cumpleaños!";
            document.getElementById("userName").innerHTML = "Danna Marcela 🎂";
            
            typeWriter(text, 0, function(){
                document.getElementById("gallery").style.opacity = "1";
            });
        }
    </script>
</body>
</html>
